<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solicitar Préstamo</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.formulario{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#218838;
}

</style>
</head>

<body>

<div class="formulario">

<h2>Solicitud de Préstamo</h2>

<form id="prestamoForm">

<input type="text" name="nombre" placeholder="Nombre completo" required>

<input type="tel" name="telefono" placeholder="Teléfono" required>

<input type="number" name="monto" placeholder="Monto solicitado" required>

<select name="plazo">
<option value="">Plazo</option>
<option>7 días</option>
<option>15 días</option>
<option>30 días</option>
</select>

<button type="submit">Solicitar Préstamo</button>

</form>

</div>

<script>

document.getElementById("prestamoForm").addEventListener("submit",function(e){

e.preventDefault();

let datos=new FormData(this);

fetch("TU_WEBHOOK_N8N",{
method:"POST",
body:datos
})

.then(res=>alert("Solicitud enviada"))

});

</script>

</body>
</html>
