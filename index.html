```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solicitud de Préstamo</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.formulario{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#25D366;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1ebe5d;
}

/* BOTON FLOTANTE */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:30px;
width:60px;
height:60px;
border-radius:50%;
text-align:center;
line-height:60px;
text-decoration:none;
box-shadow:2px 2px 10px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="formulario">

<h2>Solicitar Préstamo</h2>

<form onsubmit="enviarWhatsApp();return false;">

<input type="text" id="nombre" placeholder="Nombre completo" required>

<input type="tel" id="telefono" placeholder="Teléfono" required>

<input type="number" id="monto" placeholder="Monto solicitado" required>

<select id="plazo" required>
<option value="">Plazo</option>
<option>7 días</option>
<option>15 días</option>
<option>30 días</option>
</select>

<button type="submit">Enviar Solicitud</button>

</form>

</div>

<a href="https://api.whatsapp.com/send?phone=528133651952&text=Hola%20quiero%20información" class="whatsapp" target="_blank">
💬
</a>

<script>

function enviarWhatsApp(){

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let monto=document.getElementById("monto").value;
let plazo=document.getElementById("plazo").value;

let mensaje="Hola quiero solicitar un préstamo:%0A"+
"Nombre: "+nombre+"%0A"+
"Teléfono: "+telefono+"%0A"+
"Monto: "+monto+"%0A"+
"Plazo: "+plazo;

let url="https://api.whatsapp.com/send?phone=528133651952&text="+mensaje;

window.open(url,"_blank");

}

</script>

</body>
</html>
