<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solicitar Préstamo</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.formulario{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#25D366;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}
</style>

</head>

<body>

<div class="formulario">

<h2>Solicitar Préstamo</h2>

<form id="prestamoForm">

<input type="text" id="nombre" placeholder="Nombre" required>

<input type="tel" id="telefono" placeholder="Teléfono" required>

<input type="number" id="monto" placeholder="Monto solicitado" required>

<select id="plazo">
<option>7 días</option>
<option>15 días</option>
<option>30 días</option>
</select>

<button type="submit">Enviar Solicitud</button>

</form>

</div>

<script>

document.getElementById("prestamoForm").addEventListener("submit",async function(e){

e.preventDefault();

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let monto=document.getElementById("monto").value;
let plazo=document.getElementById("plazo").value;

let datos={
nombre:nombre,
telefono:telefono,
monto:monto,
plazo:plazo
};

await fetch("https://TU-USUARIO.app.n8n.cloud/webhook/VENTAS",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(datos)
});

let mensaje="Hola quiero un préstamo%0A"+
"Nombre: "+nombre+"%0A"+
"Teléfono: "+telefono+"%0A"+
"Monto: "+monto+"%0A"+
"Plazo: "+plazo;

let numero="5218133651952";

window.open("https://wa.me/"+numero+"?text="+mensaje);

});

</script>
