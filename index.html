<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Préstamos Rápidos</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("H-7XmCN0rWwJ2MzYw");
})();
</script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:0;
}

.container{
width:420px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:5px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

.calcular{
background:#ffc107;
}

.enviar{
background:#28a745;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

</style>
</head>

<body>

<div class="container">

<h2>Solicitar Préstamo</h2>

<label>Nombre completo</label>
<input type="text" id="nombre" required>

<label>Teléfono</label>
<input type="tel" id="telefono" required>

<label>Monto solicitado</label>
<input type="number" id="monto" required>

<label>Plazo</label>
<select id="plazo">
<option value="1.20">30 días</option>
<option value="1.35">60 días</option>
<option value="1.50">90 días</option>
</select>

<label>Total a pagar</label>
<input type="text" id="resultado" readonly>

<button class="calcular" onclick="calcular()">Calcular pago</button>

<button class="enviar" onclick="enviarCorreo()">Enviar solicitud</button>

<button class="whatsapp" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>

</div>

<script>

function calcular(){

let monto = document.getElementById("monto").value;
let interes = document.getElementById("plazo").value;

let total = monto * interes;

document.getElementById("resultado").value = "$" + total.toFixed(2);

}

function enviarWhatsApp(){

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let monto=document.getElementById("monto").value;
let total=document.getElementById("resultado").value;

let mensaje="Solicitud de préstamo%0A"+
"Nombre: "+nombre+"%0A"+
"Teléfono: "+telefono+"%0A"+
"Monto: "+monto+"%0A"+
"Total a pagar: "+total;

window.open("https://wa.me/528133651952?text="+mensaje);

}

function enviarCorreo(){

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let monto=document.getElementById("monto").value;
let total=document.getElementById("resultado").value;

emailjs.send("service_2t553ey","template_hu9jkk9",{

nombre:nombre,
telefono:telefono,
monto:monto,
total:total

})
.then(function(){

alert("Solicitud enviada correctamente");

}, function(error){

alert("Error: "+JSON.stringify(error));

});

}

</script>

</body>
</html>
