<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Préstamos Rápidos</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("H-7XmCN0rWwJ2MzYw");
})();
</script>

<style>

body{
font-family:Arial;
background:#f2f5ff;
margin:0;
}

header{
background:#0d6efd;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.sub{
text-align:center;
padding:10px;
color:#333;
font-size:15px;
}

.container{
width:420px;
margin:20px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.15);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.enviar{
background:#28a745;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
font-weight:bold;
}

.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:16px;
border-radius:50%;
font-size:26px;
text-decoration:none;
}

</style>
</head>

<body>

<header>
PRÉSTAMOS RÁPIDOS
</header>

<div class="sub">
Aprobación rápida • Sin buró • Respuesta inmediata
</div>

<div class="container">

<h3>Solicitar préstamo</h3>

<label>Nombre</label>
<input type="text" id="nombre">

<label>Teléfono</label>
<input type="tel" id="telefono">

<label>Monto solicitado</label>
<input type="number" id="monto">

<button class="enviar" onclick="enviarCorreo()">Enviar solicitud</button>

<button class="whatsapp" onclick="enviarWhatsApp()">💬 Solicitar por WhatsApp</button>

</div>

<a class="whatsapp-float" href="https://wa.me/528133651952" target="_blank">💬</a>

<script>

function validar(){

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let monto=document.getElementById("monto").value;

if(nombre=="" || telefono=="" || monto==""){

alert("Por favor llena todos los campos");
return false;

}

return true;

}

function enviarWhatsApp(){

if(!validar()) return;

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let monto=document.getElementById("monto").value;

let mensaje="Hola, quiero solicitar un préstamo%0A"+
"Nombre: "+nombre+"%0A"+
"Teléfono: "+telefono+"%0A"+
"Monto solicitado: "+monto;

window.open("https://wa.me/528133651952?text="+mensaje);

}

function enviarCorreo(){

if(!validar()) return;

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let monto=document.getElementById("monto").value;

emailjs.send("service_2t553ey","template_hu9jkk9",{

nombre:nombre,
telefono:telefono,
monto:monto

})
.then(function(){

alert("Solicitud enviada correctamente");

}, function(error){

alert("Error al enviar");

});

}

</script>

</body>
</html>
