<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Préstamos Rápidos</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
emailjs.init("H-7XmCN0rWwJ2MzYw");
})();
</script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0d6efd;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
width:420px;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.15);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.calcular{
background:#ffc107;
}

.enviar{
background:#28a745;
color:white;
}

.whatsapp{
background:#25D366;
color:white;
}

.tabla{
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:24px;
text-decoration:none;
}

</style>
</head>

<body>

<header>
Préstamos Rápidos
</header>

<div class="container">

<h3>Solicitar préstamo</h3>

<label>Nombre</label>
<input type="text" id="nombre">

<label>Teléfono</label>
<input type="tel" id="telefono">

<label>Monto solicitado</label>
<input type="number" id="monto">

<label>Plazo</label>
<select id="plazo">
<option value="1.20">30 días</option>
<option value="1.35">60 días</option>
<option value="1.50">90 días</option>
</select>

<label>Total a pagar</label>
<input type="text" id="resultado" readonly>

<button class="calcular" onclick="calcular()">Calcular pago</button>

<button class="enviar" onclick="enviarCorreo()">Enviar solicitud</button>

<button class="whatsapp" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>

<div class="tabla">

<h4>Tabla de ejemplo</h4>

<table>

<tr>
<th>Monto</th>
<th>30 días</th>
<th>60 días</th>
<th>90 días</th>
</tr>

<tr>
<td>$1000</td>
<td>$1200</td>
<td>$1350</td>
<td>$1500</td>
</tr>

<tr>
<td>$2000</td>
<td>$2400</td>
<td>$2700</td>
<td>$3000</td>
</tr>

<tr>
<td>$5000</td>
<td>$6000</td>
<td>$6750</td>
<td>$7500</td>
</tr>

</table>

</div>

</div>

<a class="whatsapp-float" href="https://wa.me/528133651952" target="_blank">💬</a>

<script>

function calcular(){

let monto=document.getElementById("monto").value;
let interes=document.getElementById("plazo").value;

let total=monto*interes;

document.getElementById("resultado").value="$"+total.toFixed(2);

}

function enviarWhatsApp(){

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let monto=document.getElementById("monto").value;
let total=document.getElementById("resultado").value;

let mensaje="Solicitud de préstamo%0A"+
"Nombre: "+nombre+"%0A"+
"Teléfono: "+telefono+"%0A"+
"Monto: "+monto+"%0A"+
"Total: "+total;

window.open("https://wa.me/528133651952?text="+mensaje);

}

function enviarCorreo(){

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let monto=document.getElementById("monto").value;
let total=document.getElementById("resultado").value;

emailjs.send("service_2t553ey","template_hu9jkk9",{

nombre:nombre,
telefono:telefono,
monto:monto,
total:total

})
.then(function(){

alert("Solicitud enviada correctamente");

}, function(error){

alert("Error: "+JSON.stringify(error));

});

}

</script>

</body>
</html>
