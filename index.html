<style>

body{

background:linear-gradient(135deg,#0f5132,#198754);

justify-content:center;
align-items:center;
min-height:100vh;

}

.container{
background:white;
color:black;
padding:30px;
border-radius:15px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

h1{
margin-bottom:10px;
color:#198754;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

.total{
font-size:22px;
font-weight:bold;
color:#198754;

}

button{
width:100%;
padding:12px;
background:#198754;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#157347;
}

.botones{
margin-top:15px;
display:flex;
gap:8px;
justify-content:center;
}

.botones a{
padding:10px 14px;
border-radius:8px;
color:white;
text-decoration:none;
font-size:14px;
}

.whatsapp{
background:#25D366;
}

.llamar{
background:#ff9800;
}

.correo{
background:#0072c6;
}

/* BOTON WHATSAPP FLOTANTE */

.whatsapp-float{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<div class="container">

<h1>Préstamos Rápidos</h1>

<input type="text" id="nombre" placeholder="Nombre">

<input type="tel" id="telefono" placeholder="Teléfono">

<input type="number" id="monto" placeholder="Monto" oninput="calcular()">

<select id="plazo" onchange="calcular()">
<option value="1.30">30 días</option>
<option value="1.60">60 días</option>
<option value="1.90">90 días</option>
</select>

<div class="total">
Total a pagar: <span id="total">$0</span>
</div>

<button onclick="enviarWhatsApp()">Enviar Solicitud</button>

<div class="botones">

<a class="whatsapp" href="https://wa.me/528133651952" target="_blank">WhatsApp</a>

<a class="llamar" href="tel:8133651952">Llamar</a>

<a class="correo" href="mailto:prestamoscesar@gmail.com">Correo</a>

</div>

</div>

<a class="whatsapp-float" href="https://wa.me/528133651952" target="_blank">
💬
</a>

<script>

function calcular(){

var monto=document.getElementById("monto").value;
var plazo=document.getElementById("plazo").value;

var total=monto*plazo;

document.getElementById("total").innerHTML="$"+total;

}

function enviarWhatsApp(){

var nombre=document.getElementById("nombre").value;
var telefono=document.getElementById("telefono").value;
var monto=document.getElementById("monto").value;
var plazo=document.getElementById("plazo").options[document.getElementById("plazo").selectedIndex].text;
var total=document.getElementById("total").innerText;

var mensaje="Solicitud de préstamo:%0A"+
"Nombre: "+nombre+"%0A"+
"Teléfono: "+telefono+"%0A"+
"Monto: "+monto+"%0A"+
"Plazo: "+plazo+"%0A"+
"Total: "+total;

var url="https://wa.me/528133651952?text="+mensaje;

window.open(url,"_blank");

}

</script>

</body>
