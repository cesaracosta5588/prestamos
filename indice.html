<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Préstamos Rápidos Online</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f7fb;
}

header{
background:#0a4bff;
color:white;
padding:40px;
text-align:center;
}

header h1{
margin:0;
font-size:40px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

button{
background:#0a4bff;
color:white;
border:none;
padding:12px;
margin-top:15px;
font-size:16px;
cursor:pointer;
border-radius:6px;
width:100%;
}

button:hover{
background:#0037cc;
}

.resultado{
font-size:22px;
margin-top:15px;
font-weight:bold;
color:#0a4bff;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px 20px;
border-radius:50px;
font-size:16px;
text-decoration:none;
}

</style>

</head>

<body>

<header>
<h1>Préstamos Rápidos</h1>
<p>Solicita tu dinero en minutos</p>
</header>

<div class="container">

<div class="card">

<h2>Simulador de préstamo</h2>

<label>Monto del préstamo</label>
<input type="number" id="monto" placeholder="Ej: 500">

<label>Plazo (meses)</label>
<input type="number" id="meses" placeholder="Ej: 6">

<button onclick="calcular()">Calcular cuota</button>

<div class="resultado" id="resultado"></div>

</div>

<div class="card">

<h2>Solicitar préstamo</h2>

<input type="text" id="nombre" placeholder="Nombre completo">

<input type="text" id="telefono" placeholder="Teléfono">

<input type="number" id="solicitud_monto" placeholder="Monto solicitado">

<button onclick="enviar()">Enviar solicitud</button>

</div>

</div>

<a class="whatsapp" href="https://wa.me/NUMERO" target="_blank">
WhatsApp
</a>

<script>

function calcular(){

let monto=document.getElementById("monto").value;
let meses=document.getElementById("meses").value;

let interes=0.20;

let total=monto*(1+interes);
let cuota=total/meses;

document.getElementById("resultado").innerHTML=
"Cuota aproximada: $"+cuota.toFixed(2);

}

function enviar(){

let nombre=document.getElementById("nombre").value;
let telefono=document.getElementById("telefono").value;
let monto=document.getElementById("solicitud_monto").value;

let mensaje="Solicitud de préstamo%0A"+
"Nombre: "+nombre+"%0A"+
"Teléfono: "+telefono+"%0A"+
"Monto: $"+monto;

window.open("https://wa.me/NUMERO?text="+mensaje);

}

</script>

</body>
</html>
